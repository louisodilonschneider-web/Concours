/* ── TAB SWITCHING ── */
window.showTab=function(t){
  document.getElementById('vc').style.display=(t==='c'?'block':'none');
  document.getElementById('vb').style.display=(t==='b'?'block':'none');
  document.getElementById('hcc').style.display=(t==='c'?'flex':'none');
  document.querySelectorAll('.tb').forEach(function(b){b.classList.remove('on');});
  document.getElementById('tab'+t).classList.add('on');
  if(t==='b')renderBib();
};

/* ── PIN / EDIT MODE ── */
window.openPinModal=function(){
  document.getElementById('pin-overlay').classList.add('open');
  document.getElementById('pin-input').value='';
  document.getElementById('pin-error').textContent='';
  setTimeout(function(){document.getElementById('pin-input').focus();},100);
};
window.closePinModal=function(){
  document.getElementById('pin-overlay').classList.remove('open');
};
window.submitPin=function(){
  var val=document.getElementById('pin-input').value.trim();
  if(val==='1234'){
    closePinModal();
    editMode=true;
    document.getElementById('edit-hdr-btn').classList.add('unlocked');
    document.getElementById('edit-hdr-btn').textContent='\u{1F513} Mode \u00e9dition ON';
    document.body.classList.add('edit-mode');
    showToast('Mode \u00e9dition activ\u00e9 \u2713');
    render();
  } else {
    document.getElementById('pin-error').textContent='Code incorrect. R\u00e9essayez.';
    document.getElementById('pin-input').value='';
    document.getElementById('pin-input').focus();
  }
};
window.toggleEditMode=function(){
  if(!editMode){
    openPinModal();
  } else {
    editMode=false;
    document.getElementById('edit-hdr-btn').classList.remove('unlocked');
    document.getElementById('edit-hdr-btn').textContent='\u{1F512} Mode \u00e9dition';
    document.body.classList.remove('edit-mode');
    showToast('Mode \u00e9dition d\u00e9sactiv\u00e9');
    render();
  }
};

/* PIN input: submit on Enter */
document.getElementById('pin-input').addEventListener('keydown',function(e){
  if(e.key==='Enter') window.submitPin();
});

/* ── EDIT MODAL ── */
window.openEditModal=function(id){
  var c=DATA.find(function(x){return x.id===id;});
  if(!c)return;
  editingId=id;
  document.getElementById('edit-id').textContent='#'+id;
  document.getElementById('edit-citation').value=c.citation;
  document.getElementById('edit-auteur').value=c.auteur||'';
  document.getElementById('edit-reference').value=c.reference||'';
  document.getElementById('edit-borne').value=c.borne||'';
  document.getElementById('edit-precision').value=c.precision||'';
  document.getElementById('edit-themes').value=(c.themes||[]).join(', ');
  document.getElementById('edit-overlay').classList.add('open');
};
window.closeEditModal=function(){
  document.getElementById('edit-overlay').classList.remove('open');
  editingId=null;
};
window.saveEdit=function(){
  if(editingId===null)return;
  var c=DATA.find(function(x){return x.id===editingId;});
  if(!c)return;
  c.citation=document.getElementById('edit-citation').value.trim();
  c.auteur=document.getElementById('edit-auteur').value.trim();
  c.reference=document.getElementById('edit-reference').value.trim();
  c.borne=document.getElementById('edit-borne').value.trim();
  c.precision=document.getElementById('edit-precision').value.trim();
  var themesRaw=document.getElementById('edit-themes').value;
  c.themes=themesRaw.split(',').map(function(t){return t.trim();}).filter(function(t){return t;});
  closeEditModal();
  render();
  showToast('Citation modifi\u00e9e \u2713');
};
window.deleteCard=function(){
  if(editingId===null)return;
  if(!confirm('Supprimer d\u00e9finitivement cette citation ?'))return;
  var idx=DATA.findIndex(function(x){return x.id===editingId;});
  if(idx>=0)DATA.splice(idx,1);
  closeEditModal();
  render();
  showToast('Citation supprim\u00e9e');
};

/* ── CITATIONS FILTER ── */
function filt(){
  return DATA.filter(function(c){
    if(ep!=='all'&&c.epreuve!==ep)return false;
    if(actOnly&&!c.acteur)return false;
    if(aI!==null&&c.themes.indexOf(ITEMS[aI])<0)return false;
    if(aB!==null&&c.borne!==BORNES[aB])return false;
    if(aP!==null&&(c.precision||'')!==PRECS[aP])return false;
    if(q){var h=N([c.citation,c.reference,c.auteur].concat(c.themes).concat([c.borne,c.precision||'',c.acteur||'']).join(' '));if(h.indexOf(N(q))<0)return false;}
    return true;
  });
}

function render(){
  var f=filt();
  document.getElementById('sts').innerHTML='<strong>'+f.length+'</strong> citation'+(f.length>1?'s':'');
  var g=document.getElementById('grid'),html='';
  if(!f.length){g.innerHTML='<div class="empty"><span class="ico">&#128269;</span><strong>Aucune citation trouv\u00e9e</strong></div>';updateSB();return;}
  for(var i=0;i<f.length;i++){
    var c=f[i],isE2=(c.epreuve==='E2'),isAct=!!(c.acteur);
    var cls='card'+(isAct?' act':(isE2?' e2':''));
    var rf='';
    if(c.auteur)rf+='<div class="cr"><span>Auteur \u00b7 </span>'+H(c.auteur)+'</div>';
    if(c.reference)rf+='<div class="cr"><span>R\u00e9f. \u00b7 </span>'+H(c.reference.replace(/\n/g,' '))+'</div>';
    var mt=rf?'<div class="cm">'+rf+'</div>':'';
    var tg='';
    for(var j=0;j<c.themes.length;j++){
      var ti=ITEMS.indexOf(c.themes[j]),ita=(ACTS.indexOf(c.themes[j])>=0);
      tg+='<button class="tag'+(ita?' tga':'')+'" data-tp="i" data-ix="'+ti+'">'+H(c.themes[j])+'</button>';
    }
    var eb=isAct?('<span class="bd2 bda">&#128100; '+H(c.acteur)+'</span>'):('<span class="bd2 '+(isE2?'bde2':'bde1')+'">'+c.epreuve+'</span>');
    html+='<div class="'+cls+'"><div class="ct"><div class="cbs">'+eb;
    if(c.borne)html+='<span class="bdm">'+H(c.borne)+'</span>';
    if(c.precision)html+='<span class="bdm" style="opacity:.6">'+H(c.precision)+'</span>';
    html+='</div><div class="card-actions">';
    html+='<button class="edit-card-btn" data-editid="'+c.id+'">'+EDITSVG+'</button>';
    html+='<button class="cp2" data-cid="'+c.id+'">'+CPSVG+'</button>';
    html+='</div></div>';
    html+='<div class="cc">'+H(c.citation).replace(/\n/g,'<br>')+'</div>';
    html+=mt+(tg?'<div class="ctg">'+tg+'</div>':'')+'</div>';
  }
  g.innerHTML=html;
  updateSB();
}

/* grid event delegation */
document.getElementById('grid').addEventListener('click',function(e){
  var tg=e.target.closest('[data-tp]');
  if(tg&&tg.dataset.tp==='i'){var ix=parseInt(tg.dataset.ix);aI=(aI===ix?null:ix);render();return;}
  var cp=e.target.closest('[data-cid]');
  if(cp){doCopy(cp,parseInt(cp.dataset.cid));return;}
  var ed=e.target.closest('[data-editid]');
  if(ed&&editMode){openEditModal(parseInt(ed.dataset.editid));return;}
});

/* sidebar event delegation */
['il','bl','pl'].forEach(function(id){
  document.getElementById(id).addEventListener('click',function(e){
    var b=e.target.closest('.sbb');if(!b)return;
    var ix=parseInt(b.dataset.ix),tp=b.dataset.tp;
    if(tp==='i')aI=(aI===ix?null:ix);
    else if(tp==='b')aB=(aB===ix?null:ix);
    else if(tp==='p')aP=(aP===ix?null:ix);
    render();
  });
});

function pool(dim){
  return DATA.filter(function(c){
    if(ep!=='all'&&c.epreuve!==ep)return false;
    if(actOnly&&!c.acteur)return false;
    if(dim!=='i'&&aI!==null&&c.themes.indexOf(ITEMS[aI])<0)return false;
    if(dim!=='b'&&aB!==null&&c.borne!==BORNES[aB])return false;
    if(dim!=='p'&&aP!==null&&(c.precision||'')!==PRECS[aP])return false;
    if(q){var h=N([c.citation,c.reference,c.auteur].concat(c.themes).concat([c.borne,c.precision||'',c.acteur||'']).join(' '));if(h.indexOf(N(q))<0)return false;}
    return true;
  });
}
function mkSB(cnt,act,tp,el){
  var ks=Object.keys(cnt).sort(function(a,b){return cnt[b]-cnt[a];});
  var h='';
  for(var i=0;i<ks.length;i++){
    var k=ks[i],n=cnt[k],lbl=(tp==='i'?ITEMS[k]:(tp==='b'?BORNES[k]:PRECS[k]));
    if(!lbl)continue;
    var ia=(tp==='i'&&ACTS.indexOf(lbl)>=0),on=(act===parseInt(k));
    h+='<button class="sbb'+(on?(ia?' ona':' on'):'')+'" data-tp="'+tp+'" data-ix="'+k+'"><span>'+H(lbl)+'</span><span class="n">'+n+'</span></button>';
  }
  document.getElementById(el).innerHTML=h;
}
function updateSB(){
  var pi=pool('i'),pb=pool('b'),pp=pool('p');
  var ic={},bc={},pc={};
  for(var i=0;i<pi.length;i++){var c=pi[i];for(var j=0;j<c.themes.length;j++){var x=ITEMS.indexOf(c.themes[j]);ic[x]=(ic[x]||0)+1;}}
  for(var i=0;i<pb.length;i++){var c=pb[i];if(c.borne){var x=BORNES.indexOf(c.borne);bc[x]=(bc[x]||0)+1;}}
  for(var i=0;i<pp.length;i++){var c=pp[i];var p=c.precision||'';if(p){var x=PRECS.indexOf(p);pc[x]=(pc[x]||0)+1;}}
  mkSB(ic,aI,'i','il');mkSB(bc,aB,'b','bl');mkSB(pc,aP,'p','pl');
}

window.fE=function(e){
  ep=e;
  ['ball','be1','be2'].forEach(function(id){var el=document.getElementById(id);if(el){el.classList.remove('oall','oe1','oe2');}});
  var mp={all:'ball',E1:'be1',E2:'be2'},cl={all:'oall',E1:'oe1',E2:'oe2'};
  var el=document.getElementById(mp[e]);if(el)el.classList.add(cl[e]);
  aI=null;aB=null;aP=null;render();
};
window.toggleAct=function(){actOnly=!actOnly;document.getElementById('bact').classList.toggle('on',actOnly);render();};
window.clearAll=function(){ep='all';aI=null;aB=null;aP=null;q='';actOnly=false;document.getElementById('csrch').value='';document.getElementById('bact').classList.remove('on');window.fE('all');};

var _st;
document.getElementById('csrch').addEventListener('input',function(e){
  clearTimeout(_st);_st=setTimeout(function(){q=e.target.value.trim();render();},200);
});

/* ── BIBLIOGRAPHY ── */
function bFilt(){
  return BIB.filter(function(b){
    if(bEp==='E1'&&b.e.indexOf('E1')<0)return false;
    if(bEp==='E2'&&b.e.indexOf('E2')<0)return false;
    if(bAl!==''){var fc=N(b.a).charAt(0).toUpperCase();if(fc!==bAl)return false;}
    if(bQ){var h=N([b.a].concat(b.r||[]).concat(b.t||[]).concat(b.ac||[]).join(' '));if(h.indexOf(N(bQ))<0)return false;}
    return true;
  });
}

function renderBib(){
  var f=bFilt();
  document.getElementById('bsts').innerHTML='<strong>'+f.length+'</strong> auteur'+(f.length>1?'s':'');
  var avail={};
  for(var i=0;i<f.length;i++){var ch=N(f[i].a).charAt(0).toUpperCase();if(ch>='A'&&ch<='Z')avail[ch]=true;}
  var ah='<button class="alb'+(bAl===''?' alb-on':'')+'" data-al="">Tous</button>';
  for(var i=0;i<26;i++){
    var ch=String.fromCharCode(65+i),has=!!avail[ch];
    ah+='<button class="alb'+(bAl===ch?' alb-on':'')+(has?'':' alb-off')+'" data-al="'+ch+'">'+ch+'</button>';
  }
  document.getElementById('an').innerHTML=ah;
  if(!f.length){document.getElementById('bg').innerHTML='<div class="empty"><span class="ico">&#128269;</span><strong>Aucun auteur trouv\u00e9</strong></div>';return;}
  var groups={},order=[];
  for(var i=0;i<f.length;i++){var b=f[i],ch2=b.a.charAt(0).toUpperCase();if(!groups[ch2]){groups[ch2]=[];order.push(ch2);}groups[ch2].push(b);}
  var html='';
  for(var li=0;li<order.length;li++){
    var letter=order[li],grp=groups[letter];
    html+='<div class="bsec"><h2>'+letter+'</h2><small>'+grp.length+' auteur'+(grp.length>1?'s':'')+'</small></div>';
    for(var gi=0;gi<grp.length;gi++){
      var b=grp[gi],h1=(b.e.indexOf('E1')>=0),h2=(b.e.indexOf('E2')>=0);
      var bcls='bc'+(h1&&h2?' bbo':(h2?' be2':''));
      html+='<div class="'+bcls+'">';
      /* Clickable author name → go to citations filtered by author */
      html+='<div class="ba"><span class="ba-link" data-goto-author="'+H(b.a)+'">'+H(b.a)+'</span></div>';
      html+='<div class="bbs">';
      if(h1)html+='<span class="bep bee1">E1</span>';
      if(h2)html+='<span class="bep bee2">E2</span>';
      html+='<span class="bcnt">'+b.n+' citation'+(b.n>1?'s':'')+'</span>';
      if(b.ac)for(var ai=0;ai<b.ac.length;ai++)html+='<span class="bact">&#128100; '+H(b.ac[ai])+'</span>';
      html+='</div>';
      if(b.r&&b.r.length){html+='<div class="brs">';for(var ri=0;ri<b.r.length;ri++)if(b.r[ri])html+='<div class="br">'+H(b.r[ri])+'</div>';html+='</div>';}
      if(b.t&&b.t.length){
        html+='<div class="bth">';
        var mx=Math.min(b.t.length,6);
        for(var ti=0;ti<mx;ti++){var tidx=ITEMS.indexOf(b.t[ti]);html+='<button class="btt" data-goto="'+tidx+'">'+H(b.t[ti])+'</button>';}
        html+='</div>';
      }
      /* See all citations button */
      html+='<button class="bsee" data-goto-author="'+H(b.a)+'">Voir les '+b.n+' citation'+(b.n>1?'s':'')+' \u2192</button>';
      html+='</div>';
    }
  }
  document.getElementById('bg').innerHTML=html;
}

/* bib grid event delegation */
document.getElementById('bg').addEventListener('click',function(e){
  /* theme tag click */
  var bt=e.target.closest('[data-goto]');
  if(bt){var ix=parseInt(bt.dataset.goto);if(ix>=0){aI=ix;showTab('c');render();}return;}
  /* author name or "see citations" click → filter by author */
  var ba=e.target.closest('[data-goto-author]');
  if(ba){
    var authorName=ba.dataset.gotoAuthor;
    goToAuthor(authorName);
    return;
  }
});

function goToAuthor(authorName){
  /* Switch to citations tab and filter by this author using search */
  ep='all';aI=null;aB=null;aP=null;actOnly=false;
  q=authorName;
  document.getElementById('csrch').value=authorName;
  ['ball','be1','be2'].forEach(function(id){var el=document.getElementById(id);if(el)el.classList.remove('oall','oe1','oe2');});
  document.getElementById('ball').classList.add('oall');
  window.showTab('c');
  render();
}

/* alpha nav delegation */
document.getElementById('an').addEventListener('click',function(e){
  var ab=e.target.closest('[data-al]');
  if(ab){bAl=ab.dataset.al;renderBib();}
});
/* bib filter buttons */
document.getElementById('bfg').addEventListener('click',function(e){
  var bf=e.target.closest('[data-bep]');
  if(bf){
    bEp=bf.dataset.bep;
    document.querySelectorAll('#bfg [data-bep]').forEach(function(b){b.className='bf';});
    var cls={all:'oall',E1:'oe1',E2:'oe2'};
    bf.classList.add(cls[bEp]);
    renderBib();
  }
});
var _bst;
document.getElementById('bsrch').addEventListener('input',function(e){
  clearTimeout(_bst);_bst=setTimeout(function(){bQ=e.target.value.trim();renderBib();},200);
});

/* ── COPY ── */
function doCopy(btn,id){
  var c=DATA.find(function(x){return x.id===id;});
  var parts=[c.citation];
  if(c.auteur)parts.push(c.auteur);
  if(c.reference)parts.push(c.reference.replace(/\n/g,' '));
  navigator.clipboard.writeText(parts.join('\n\u2014 '));
  btn.classList.add('ok');btn.textContent='\u2713 Copi\u00e9';
  showToast('Citation copi\u00e9e \u2713');
  setTimeout(function(){btn.classList.remove('ok');btn.innerHTML=CPSVG;},2000);
}
function showToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');
  setTimeout(function(){t.classList.remove('on');},2200);
}

render();
