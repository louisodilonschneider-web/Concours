<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citations EPS — CAPEPS &amp; Agrégation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f5f0;--sf:#fff;--sf2:#f0ede6;--bd:#e0dbd0;
  --tx:#1a1714;--tx2:#6b6560;--tx3:#9b9590;
  --e1:#2d5a3d;--e1l:#e8f0ea;--e2:#5a3d2d;--e2l:#f0e8e0;
  --ac:#3a2070;--acl:#ede8f5;
  --warn:#b45309;--warnl:#fef3c7;
  --sh:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --sh2:0 4px 12px rgba(0,0,0,.10),0 8px 32px rgba(0,0,0,.06);
  --r:12px;--rs:6px;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:15px;line-height:1.6}

/* HEADER */
header{background:var(--sf);border-bottom:1px solid var(--bd);padding:12px 28px 8px;position:sticky;top:0;z-index:100}
.hi{max-width:1440px;margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.lt{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;flex-shrink:0}
.ls{font-size:10px;font-weight:500;color:var(--tx3);letter-spacing:1.4px;text-transform:uppercase;display:block;margin-top:1px}
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--bd);flex-shrink:0;margin-bottom:-2px}
.tb{padding:6px 16px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;color:var(--tx3);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tb:hover{color:var(--tx2)}.tb.on{color:var(--e1);border-bottom-color:var(--e1)}
.hc{flex:1;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sw{flex:1;min-width:160px;position:relative}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--tx3);pointer-events:none}
input[type=text]{width:100%;padding:8px 10px 8px 32px;border:1.5px solid var(--bd);border-radius:var(--rs);background:var(--bg);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--tx);outline:none;transition:border-color .15s}
input[type=text]:focus{border-color:var(--e1)}
input[type=text]::placeholder{color:var(--tx3)}
.fb{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.seg{display:flex;border:1.5px solid var(--bd);border-radius:var(--rs);overflow:hidden;background:var(--sf)}
.seg button{padding:6px 11px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;color:var(--tx2);transition:all .15s;white-space:nowrap}
.seg button:not(:last-child){border-right:1px solid var(--bd)}.seg button:hover{background:var(--sf2)}
.oall{background:var(--tx)!important;color:#fff!important}
.oe1{background:var(--e1)!important;color:#fff!important}
.oe2{background:var(--e2)!important;color:#fff!important}
.ab-btn{padding:6px 11px;border-radius:var(--rs);border:1.5px solid var(--bd);background:var(--sf);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;color:var(--tx2);transition:all .15s}
.ab-btn:hover{border-color:var(--ac);color:var(--ac)}.ab-btn.on{background:var(--ac);border-color:var(--ac);color:#fff}
.edit-btn-hdr{padding:6px 11px;border-radius:var(--rs);border:1.5px solid var(--warn);background:var(--warnl);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;color:var(--warn);transition:all .15s;white-space:nowrap}
.edit-btn-hdr:hover{background:var(--warn);color:#fff}
.edit-btn-hdr.unlocked{background:var(--warn);color:#fff}
.sts{font-size:11px;color:var(--tx3);white-space:nowrap;margin-left:auto}.sts strong{color:var(--tx2);font-weight:500}

/* CITATIONS LAYOUT */
.wrap{max-width:1440px;margin:0 auto;padding:16px 28px 48px;display:grid;grid-template-columns:220px 1fr;gap:16px;align-items:start}
.side{position:sticky;top:104px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:13px;max-height:calc(100vh - 118px);overflow-y:auto}
.side::-webkit-scrollbar{width:3px}.side::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.sbh{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);margin-bottom:5px;padding-bottom:5px;border-bottom:1px solid var(--bd)}
.sbs{margin-bottom:13px}
.sbb{padding:4px 7px;border-radius:4px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--tx2);cursor:pointer;text-align:left;transition:all .12s;display:flex;align-items:center;justify-content:space-between;gap:5px;width:100%}
.sbb:hover{background:var(--sf2);color:var(--tx)}.sbb.on{background:var(--e1l);color:var(--e1);font-weight:500}.sbb.ona{background:var(--acl);color:var(--ac);font-weight:500}
.sbb span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sbb .n{font-size:10px;color:var(--tx3);background:var(--sf2);padding:1px 4px;border-radius:6px;flex-shrink:0}
.sbb.on .n,.sbb.ona .n{background:currentColor;color:#fff;opacity:.85}
.clr{width:100%;padding:6px;border-radius:var(--rs);border:1.5px dashed var(--bd);background:none;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--tx3);cursor:pointer;transition:all .15s;margin-top:5px}
.clr:hover{border-color:var(--e2);color:var(--e2)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:11px}

/* CITATION CARD */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;gap:8px;box-shadow:var(--sh);transition:box-shadow .2s,transform .2s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--e1)}
.card.e2::before{background:var(--e2)}.card.act::before{background:var(--ac)}
.card.act{background:linear-gradient(135deg,var(--sf) 85%,var(--acl))}
.card:hover{box-shadow:var(--sh2);transform:translateY(-1px)}
.ct{display:flex;align-items:flex-start;justify-content:space-between;gap:5px}
.cbs{display:flex;flex-wrap:wrap;gap:3px}
.bd2{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px}
.bde1{background:var(--e1l);color:var(--e1)}.bde2{background:var(--e2l);color:var(--e2)}.bda{background:var(--acl);color:var(--ac)}
.bdm{font-size:9.5px;padding:2px 6px;border-radius:4px;background:#eeeae2;color:var(--tx2)}
.card-actions{display:flex;gap:4px;flex-shrink:0}
.cp2{padding:3px 7px;border:1px solid var(--bd);border-radius:4px;background:none;cursor:pointer;color:var(--tx3);font-size:10px;display:flex;align-items:center;gap:3px;transition:all .15s;font-family:'DM Sans',sans-serif}
.cp2:hover{background:var(--sf2);color:var(--tx2)}.cp2.ok{color:var(--e1);border-color:var(--e1);background:var(--e1l)}
.edit-card-btn{padding:3px 7px;border:1px solid var(--warn);border-radius:4px;background:var(--warnl);cursor:pointer;color:var(--warn);font-size:10px;display:none;align-items:center;gap:3px;transition:all .15s;font-family:'DM Sans',sans-serif}
.edit-card-btn:hover{background:var(--warn);color:#fff}
.edit-mode .edit-card-btn{display:flex}
.cc{font-family:'Playfair Display',serif;font-size:13.5px;line-height:1.65;color:var(--tx);font-style:italic;white-space:pre-wrap}
.cm{display:flex;flex-direction:column;gap:2px;padding-top:5px;border-top:1px solid var(--bd)}
.cr{font-size:11px;color:var(--tx2)}.cr span{color:var(--tx3)}
.ctg{display:flex;flex-wrap:wrap;gap:3px}
.tag{font-size:10px;padding:2px 6px;border-radius:10px;background:#eeeae2;color:var(--tx2);cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .12s}
.tag:hover{background:var(--e1l);color:var(--e1)}.tga{background:var(--acl);color:var(--ac)}.tga:hover{background:var(--ac);color:#fff}

/* BIBLIOGRAPHY */
#vb{display:none}
.bw{max-width:1440px;margin:0 auto;padding:18px 28px 48px}
.btop{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.bfsw{flex:1;min-width:200px}
.bfg{display:flex;gap:5px}
.bf{padding:6px 13px;border-radius:var(--rs);border:1.5px solid var(--bd);background:var(--sf);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;color:var(--tx2);transition:all .15s}
.bf:hover{border-color:var(--e1);color:var(--e1)}
.an{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px}
.alb{min-width:28px;height:28px;padding:0 5px;border-radius:6px;border:1.5px solid var(--bd);background:var(--sf);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;color:var(--tx2);transition:all .12s;display:flex;align-items:center;justify-content:center}
.alb:hover:not(.alb-off){border-color:var(--e1);color:var(--e1)}.alb.alb-on{background:var(--e1);border-color:var(--e1);color:#fff}.alb.alb-off{opacity:.25;cursor:default;pointer-events:none}
.bg{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}
.bsec{grid-column:1/-1;padding:8px 0 4px;border-bottom:2px solid var(--bd);margin-top:6px;display:flex;align-items:baseline;gap:12px}
.bsec h2{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:var(--tx3)}.bsec small{font-size:11px;color:var(--tx3)}
.bc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:13px;box-shadow:var(--sh);position:relative;overflow:hidden;transition:box-shadow .2s,transform .2s}
.bc::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--e1)}
.bc.be2::before{background:var(--e2)}.bc.bbo::before{background:linear-gradient(to bottom,var(--e1) 50%,var(--e2) 50%)}
.bc:hover{box-shadow:var(--sh2);transform:translateY(-1px)}
.ba{font-weight:600;font-size:13.5px;color:var(--tx);margin-bottom:5px}
/* Author name clickable */
.ba-link{cursor:pointer;border-bottom:1px dashed var(--e1);color:var(--e1);transition:color .15s}
.ba-link:hover{color:var(--e2)}
.bbs{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px}
.bep{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px}
.bee1{background:var(--e1l);color:var(--e1)}.bee2{background:var(--e2l);color:var(--e2)}
.bcnt{font-size:10px;background:#eeeae2;color:var(--tx2);padding:2px 6px;border-radius:4px}
.bact{font-size:10px;background:var(--acl);color:var(--ac);padding:2px 6px;border-radius:4px}
.brs{margin-top:6px;border-top:1px solid var(--bd);padding-top:5px}
.br{font-size:11px;color:var(--tx2);padding:1px 0;line-height:1.4}
.br::before{content:'\B7  ';color:var(--tx3)}
.bth{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
.btt{font-size:9.5px;padding:1px 5px;border-radius:8px;background:var(--sf2);color:var(--tx3);cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .12s}
.btt:hover{background:var(--e1l);color:var(--e1)}
/* See citations button */
.bsee{margin-top:8px;padding:5px 10px;border-radius:var(--rs);border:1.5px solid var(--e1);background:none;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;color:var(--e1);width:100%;transition:all .15s;text-align:center}
.bsee:hover{background:var(--e1);color:#fff}

/* EDIT MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--sf);border-radius:var(--r);padding:24px;width:100%;max-width:560px;box-shadow:0 20px 60px rgba(0,0,0,.2);display:flex;flex-direction:column;gap:16px;max-height:90vh;overflow-y:auto}
.modal h2{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:var(--tx)}
.modal-close{position:absolute;top:16px;right:16px;border:none;background:none;font-size:20px;cursor:pointer;color:var(--tx3);line-height:1}
.modal-close:hover{color:var(--tx)}
.modal-rel{position:relative}
.field-group{display:flex;flex-direction:column;gap:5px}
.field-group label{font-size:11px;font-weight:600;color:var(--tx2);letter-spacing:.5px;text-transform:uppercase}
.field-group textarea,.field-group input[type=text]{width:100%;padding:8px 10px;border:1.5px solid var(--bd);border-radius:var(--rs);background:var(--bg);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--tx);outline:none;resize:vertical;transition:border-color .15s}
.field-group textarea:focus,.field-group input[type=text]:focus{border-color:var(--e1)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.btn-cancel{padding:8px 16px;border-radius:var(--rs);border:1.5px solid var(--bd);background:none;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;color:var(--tx2);transition:all .15s}
.btn-cancel:hover{background:var(--sf2)}
.btn-save{padding:8px 16px;border-radius:var(--rs);border:none;background:var(--e1);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;color:#fff;transition:all .15s}
.btn-save:hover{background:#1e4029}
.btn-delete{padding:8px 16px;border-radius:var(--rs);border:1.5px solid #dc2626;background:none;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;color:#dc2626;transition:all .15s;margin-right:auto}
.btn-delete:hover{background:#dc2626;color:#fff}

/* PIN MODAL */
.pin-modal{background:var(--sf);border-radius:var(--r);padding:28px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.2);text-align:center;display:flex;flex-direction:column;gap:16px;align-items:center}
.pin-modal h2{font-family:'Playfair Display',serif;font-size:18px;font-weight:600}
.pin-modal p{font-size:13px;color:var(--tx2)}
.pin-input{width:160px;padding:12px;border:2px solid var(--bd);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:22px;font-weight:600;text-align:center;letter-spacing:8px;outline:none;transition:border-color .15s}
.pin-input:focus{border-color:var(--e1)}
.pin-error{font-size:12px;color:#dc2626;min-height:16px}
.btn-pin{padding:10px 24px;border-radius:var(--rs);border:none;background:var(--e1);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;color:#fff}
.btn-pin:hover{background:#1e4029}

.empty{grid-column:1/-1;text-align:center;padding:60px;color:var(--tx3)}
.empty .ico{font-size:32px;display:block;margin-bottom:8px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--tx);color:#fff;padding:8px 14px;border-radius:var(--rs);font-size:11px;font-weight:500;opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none;z-index:999}
.toast.on{opacity:1;transform:translateY(0)}
@media(max-width:900px){.wrap{grid-template-columns:1fr;padding:10px}.side{position:static;max-height:none}header{padding:10px 14px}.bw{padding:12px}}
</style>
</head>
<body>
<header><div class="hi">
  <div><div class="lt">Bibliothèque EPS</div><span class="ls">CAPEPS &amp; Agrégation · Citations</span></div>
  <div class="tabs">
    <button class="tb on" id="tabc" onclick="showTab('c')">📝 Citations</button>
    <button class="tb" id="tabb" onclick="showTab('b')">📚 Bibliographie</button>
  </div>
  <div class="hc" id="hcc">
    <div class="sw"><svg width="14" height="14" viewBox="0 0 15 15" fill="none"><path d="M10 6.5C10 8.433 8.433 10 6.5 10C4.567 10 3 8.433 3 6.5C3 4.567 4.567 3 6.5 3C8.433 3 10 4.567 10 6.5ZM9.44 10.15C8.65 10.7 7.61 11 6.5 11C4.015 11 2 8.985 2 6.5C2 4.015 4.015 2 6.5 2C8.985 2 11 4.015 11 6.5C11 7.61 10.7 8.65 10.15 9.44L12.85 12.15C13.05 12.35 13.05 12.65 12.85 12.85C12.65 13.05 12.35 13.05 12.15 12.85L9.44 10.15Z" fill="currentColor" fill-rule="evenodd" clip-rule="evenodd"/></svg>
      <input type="text" id="csrch" placeholder="Rechercher citation, auteur, thème…" autocomplete="off"></div>
    <div class="fb">
      <div class="seg"><button id="ball" class="oall" onclick="fE('all')">Toutes</button><button id="be1" onclick="fE('E1')">E1</button><button id="be2" onclick="fE('E2')">E2</button></div>
      <button class="ab-btn" id="bact" onclick="toggleAct()">👤 Acteurs</button>
    </div>
    <div class="sts" id="sts">— citations</div>
    <button class="edit-btn-hdr" id="edit-hdr-btn" onclick="toggleEditMode()">🔒 Mode édition</button>
  </div>
</div></header>

<!-- CITATIONS VIEW -->
<div id="vc">
  <div class="wrap">
    <aside class="side">
      <div class="sbs"><div class="sbh">Thème / Item</div><div id="il"></div></div>
      <div class="sbs"><div class="sbh">Sous-item / Borne</div><div id="bl"></div></div>
      <div class="sbs"><div class="sbh">Précision</div><div id="pl"></div></div>
      <button class="clr" onclick="clearAll()">✕ Effacer les filtres</button>
    </aside>
    <main><div class="grid" id="grid"></div></main>
  </div>
</div>

<!-- BIBLIOGRAPHY VIEW -->
<div id="vb">
  <div class="bw">
    <div class="btop">
      <div class="bfsw sw"><svg width="14" height="14" viewBox="0 0 15 15" fill="none"><path d="M10 6.5C10 8.433 8.433 10 6.5 10C4.567 10 3 8.433 3 6.5C3 4.567 4.567 3 6.5 3C8.433 3 10 4.567 10 6.5ZM9.44 10.15C8.65 10.7 7.61 11 6.5 11C4.015 11 2 8.985 2 6.5C2 4.015 4.015 2 6.5 2C8.985 2 11 4.015 11 6.5C11 7.61 10.7 8.65 10.15 9.44L12.85 12.15C13.05 12.35 13.05 12.65 12.85 12.85C12.65 13.05 12.35 13.05 12.15 12.85L9.44 10.15Z" fill="currentColor" fill-rule="evenodd" clip-rule="evenodd"/></svg>
        <input type="text" id="bsrch" placeholder="Rechercher un auteur, une référence…" autocomplete="off"></div>
      <div class="bfg" id="bfg">
        <button class="bf oall" data-bep="all">Tous</button>
        <button class="bf" data-bep="E1">E1 · Enseigner</button>
        <button class="bf" data-bep="E2">E2 · Agir</button>
      </div>
      <div class="sts" id="bsts">— auteurs</div>
    </div>
    <div class="an" id="an"></div>
    <div class="bg" id="bg"></div>
  </div>
</div>

<!-- PIN MODAL -->
<div class="modal-overlay" id="pin-overlay" onclick="if(event.target===this)closePinModal()">
  <div class="pin-modal">
    <div style="font-size:32px">🔒</div>
    <h2>Mode édition</h2>
    <p>Entrez le code à 4 chiffres pour activer l’édition des citations.</p>
    <input class="pin-input" id="pin-input" type="password" maxlength="4" placeholder="••••" autocomplete="off">
    <div class="pin-error" id="pin-error"></div>
    <button class="btn-pin" onclick="submitPin()">Valider</button>
    <button class="btn-cancel" onclick="closePinModal()">Annuler</button>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-overlay" onclick="if(event.target===this)closeEditModal()">
  <div class="modal modal-rel">
    <button class="modal-close" onclick="closeEditModal()">&#x2715;</button>
    <h2>✏️ Modifier la citation <span id="edit-id" style="color:var(--tx3);font-size:14px"></span></h2>
    <div class="field-group"><label>Citation</label><textarea id="edit-citation" rows="4"></textarea></div>
    <div class="field-group"><label>Auteur</label><input type="text" id="edit-auteur"></div>
    <div class="field-group"><label>Référence / Ouvrage</label><input type="text" id="edit-reference"></div>
    <div class="field-group"><label>Sous-item / Borne</label><input type="text" id="edit-borne"></div>
    <div class="field-group"><label>Précision</label><input type="text" id="edit-precision"></div>
    <div class="field-group"><label>Thèmes (séparés par des virgules)</label><input type="text" id="edit-themes"></div>
    <div class="modal-actions">
      <button class="btn-delete" onclick="deleteCard()">🗑 Supprimer</button>
      <button class="btn-cancel" onclick="closeEditModal()">Annuler</button>
      <button class="btn-save" onclick="saveEdit()">Enregistrer</button>
    </div>
  </div>
</div>

ion","proposition":"","acteur":""},{"id":654,"epreuve":"E2","themes":["PARADIGME COGNITIF"],"borne":"Courant des bases de connaissances","precision":"Conséquence apprentissage","citation":"Cette méthode « surestime le rôle des représentations dans la mise en oeuvre et la régulation des comportements sans faire référence aux processus sensori-moteurs qui sous-tendent le déclenchement et l’exécution du mouvement »","auteur":"Laurent Temprado","reference":"Apprentissage et contrôle du mouvement dans les APS 1996","nature":"Agrégation","proposition":"","acteur":""},{"id":655,"epreuve":"E2","themes":["PARADIGME COGNITIF"],"borne":"« Processus conscient »\nApprentissage\nImplicite > explicite","precision":"Thèse","citation":"L’optimisation des apprentissages nécessite la promotion d’un mode d’apprentissage implicite, plus efficace que l’apprentissage explicite","auteur":"Liao & Masters","reference":"Analogie Learning, 2001","nature":"Agrégation","proposition":"","acteur":""},{"id":656,"epreuve":"E2","themes":["PARADIGME COGNITIF"],"borne":"« Processus conscient »\nApprentissage\nImplicite > explicite","precision":"Thèse","citation":"L’attention portée au mouvement dégrade les performances des experts et favorise celles des novices","auteur":"Beilock et al","reference":"When paying attention becomes counterproductive, 2002","nature":"Agrégation","proposition":"","acteur":""},{"id":657,"epreuve":"E2","themes":["PARADIGME COGNITIF"],"borne":"« Processus conscient »\nApprentissage\nImplicite > explicite","precision":"Thèse","citation":"Chute de la performance se manifeste lorsqu’un individu porte son attention sur le mouvement et favorise les traitements explicites Focalisation interne entraine surcharge des processus attentionnels en mémoire de travail, associant chez les débutants à une réduction des perf et de l’app","auteur":"Maxwell et al","reference":"Du novice à l’inconnu, 2000","nature":"Agrégation","proposition":"","acteur":""},{"id":658,"epreuve":"E2","themes":["PAR . PeurL’engloutissement se caractérise par une perte d’équilibre, d’appuis terrien (Catteau, La natation de demain, 2008). Les élèves, ayant cette peur, pensent ne jamais remonter Mauvaise expérience antérieure ou transmise de l’adulte à l’enfant. Dès lors, la peur de l’inconnu est source d’angoisse pour l’enfant avec une mauvaise perception du milieu Conduites typiquesDans l’eau, la crainte de l’enfant sera celle du remplissage (Catteau, La natation de demain, 2008), ce qu’il perçoit comme un danger en crispant sa bouche, gonflant ses joues, étant tête hors de l’eau, raidissant ses muscles, réalisant une extension de sa nuque (Vadepied, Laisser l’eau faire, 1981). D’autres blocages apparaissent comme une tétanie, une maladresse ou une incapacité d’écoute","auteur":"Schmidt","reference":"Learning, Memory, and Cognition n°15, 1989","nature":"Agrégation","proposition":"","acteur":""},{"id":747,"epreuve":"E2","themes":["TECHNIQUES CORPORELLES"],"borne":"CA 5","precision":"Constat","citation":"« Montée en puissance des sports qui se pratiquent de manière autonome »","auteur":"Michot","reference":"INJEP n°15, 2021","nature":"Agrégation","proposition":"","acteur":""},{"id":748,"epreuve":"E2","themes":["TECHNIQUES CORPORELLES"],"borne":"CA 3\nGymnastique","precision":"Constat","citation":"« Des sensations valorisantes du fait de la réussite dans des situations perçues comme difficiles par nos élèves","auteur":"Thomas","reference":"Gymnastique sportive, 2004","nature":"Agrégation","proposition":"","acteur":""},{"id":749,"epreuve":"E2","themes":["CORPS"],"borne":"Mixité","precision":"Déclinaison","citation":"Ensemble séparé       .        .                                                                                                           Mixité “ensemble-séparé” (ségrégation) Ensemble indifférencié  .                                                                                                                Mixité “banalisée” (sans d’aménagement ; présupposé que la S"],"borne":"Enseignant\nIntervention","precision":"Interventions\nG > F","citation":"Les garçons sont capables de mettre en œuvre des « stratégies d’accaparement » de l’enseignant dont les comportements déviants font partie","auteur":"Spender","reference":"1982","nature":"Agrégation","proposition":"","acteur":""},{"id":839,"epreuve":"E2","themes":["CORPS"],"borne":"Enseignant\nIntervention","precision":"Interventions\nG > F","citation":"Les garçons sont plutôt félicités pour leurs résultats et les filles pour leurs effortsElles sont par ailleurs moins encouragées, tandis que les garçons reçoivent plus de feed-backs correctifs sur les habiletés","auteur":"MacDonald 1990","reference":"","nature":"Agrégation","proposition":"","acteur":""},{"id":840,"epreuve":"E2","themes":["CORPS"],"borne":"Enseignant\nIntervention","precision":"Effet Pygmalion","citation":"Les attentes des enseignants vis-à-vis des élèves font apparaître les comportements attendus chez ces derniers","auteur":"Lecomte 2019","reference":"","nature":"Agrégation","proposition":"","acteur":""},{"id":841,"epreuve":"E2","themes":["CORPS"],"borne":"Enseignant\nIntervention","precision":"Effet Pygmalion","citation":"Plus les attentes s’appuient sur des éléments objectifs (résultat, motivation, implication) = Faible effet Pygmalion jouant sur les résultats Plus les attentes s’appuient sur des éléments peu fiables (résultat fratrie, stéréotypes de sexes) = Fort effet Pygmalion jouant sur les résultats","auteur":"Jussim et al 1998","reference":"","nature":"Agrégation","proposition":"","acteur":""},{"id":842,"epreuve":"E2","themes":["CORPS"],"borne":"Enseignant\nIntervention","precision":"Autonomie/Guidage selon motivation élèves","citation":"Selon travaux de Ryan et Deci sur l’autodétermination (2000), les enseignants adoptent un style soutenant l’autonomie avec les élèves perçus comme motivés, alors qu’un style plus contrôlant serait utilisé avec les élèves perçus comme peu motivés (Ryan et Deci 2000)En d’autres termes, il laisserait plus de choix, plus d’initiatives, serait plus attentif et compréhensif à l’égard des élèves motivés tandis qu’il serait plus directif et aurait plus recours à des facteurs de motivation extrinsèque (récompenses/punitions) avec les élèves perçus comme peu motivés","auteur":"","reference":"","nature":"Agrégation","proposition":"","acteur":""},{"id":843,"epreuve":"E2","themes":["CORPS"],"borne":"Activité des élèves","precision":"Interactions\nGroupes","citation":"« Permettent de multiplier les sites de travail, et donc d’optimiser l’activité des élèves et les interventions de l’enseignant »","auteur":"Hauw 2000","reference":"","nature":"Agrégation","proposition":"","acteur":""},{"id":844,"epreuve":"E2","themes":["CORPS"],"borne":"Activité des élèves","precision":"Interactions\nGroupes","citation":"Niveaux + Facilite visibilité et adaptation des tâches de l’enseignant -  Risque de démotiver les élèves Besoins + Niveau différent mais lacune similaire -  Risque d’exclusion Variables + Gérer les incompatibilités (relationnelle, propre à l’APSA tel que les poids en BF ou Escalade) -  Réduit la reproduction de stabilité au sein des groupes","auteur":"","reference":"","nature":"Agrégation","proposition":"","acteur":""},{"id":845,"epreuve":"E2","themes":["CORPS"],"borne":"Activité des élèves","precision":"Interactions\nGroupes","citation":"Affinités + Facilite l’engagement et la coopération -  Emergence de comportements déviants Hétérogènes + Si écart de niveaux pas trop important, cela peut faciliter l’entraide et l’échange -  Entraide non spontanée Mixtes + Doit s’inscrire dans une configuration privilégiant toutes les formes de diversité -  Conduit souvent à séparer filles et garçons","auteur":"","reference":"","nature":"Agrégation","proposition":"","acteur":""},{"id":846,"epreuve":"E2","themes":["CORPS"],"borne":"Activité des élèves","precision":"Interactions\nGroupes","citation":"Les élèves peuvent suivre un enseignement sans forcément apprendre","auteur":"Gal-Petitfaux","reference":"Les dossiers Enseigner l'EPS n°5, 2019","nature":"Agrégation","proposition":"","acteur":""},{"id":847,"epreuve":"E2","themes":["CORPS"],"borne":"Activité des élèves","precision":"Interactions\nGroupes","citation":"Tous les élèves peuvent apprendre mais nul ne peut contraindre un élève à apprendre","auteur":"Gal-Petitfaux","reference":"Les dossiers Enseigner l'EPS n°5, 2019","nature":"Agrégation","proposition":"","acteur":""},{"id":848,"epreuve":"E2","themes":["CORPS"],"borne":"Activité des élèves","precision":"Interactions\nGroupes","citation":"Modèle « tache-activité » (Leplat & Hoc 1983) en psychologie du travail Discordance entre la tâche prescrite par l’enseignant et l’activité effective des élèves Les tâches proposées aux élèves peuvent faire l’objet de négociations et de contestation qui mettent en péril l’autorité de l’enseignant, refoule ses ambitions et fait le constat de son impuissance","auteur":"","reference":"","nature":"Agrégation","proposition":"","acteur":""},{"id":849,"epreuve":"E2","themes":["CORPS"],"borne":"Activité des élèves","precision":"Interactions\nGroupes","citation":"Modèle du réel de l’activité (Clot 2008) en clinique de l’activité Activité réalisée (ce que fait l’individu) et le réel de l’activité (ce qui existe au de la des actions visibles) Peut faire émerger des activités contrariées, suspendues ou empêchées","auteur":"Clot 1999","reference":"","nature":"Agrégation","proposition":"","acteur":""},{"id":850,"epreuve":"E2","themes":["CORPS"],"borne":"Expertise des enseignants","precision":"Novice","citation":"Expériences indéterminées et anxiogènes chez les enseignants débutants : (Ria 2001 ; 2005), accroissant l’anxiété Inadéquation/décalage entre le projet de leçon (parfois idéaliste) et l’activité de classe (situation perçue) Volonté de se faire apprécier par les élèves","auteur":"","reference":"","nature":"Agrégation","proposition":"","acteur":""},{"id":851,"epreuve":"E2","themes":["CORPS"],"borne":"Expertise des enseignants","precision":"Expert","citation":"Théorie de la contagion émotionnelle (Hatfield, Cacioppo et Rapson, 1994) = transfert d’une émotion d’une personne à une autre Travail émotionnelle (Morris & Feldman, 1996) = L’enseignant pourrait exprimer volontairement des émotions afin d’agir sur l’état affectif de ses élèves Jeu superficiel = masquage ou simulation d’émotion Jeu profond = modulation de l’émotion Expression naturelle = conforme aux règles d’affichage (ce qui socialement attendu des enseignants) Corps théâtralisé par les enseignants experts, instrumentaliser leurs émotions à des fins éducatives","auteur":"Chen 2016","reference":"","nature":"Agrégation","proposition":"","acteur":""},{"id":852,"epreuve":"E2","themes":["CORPS"],"borne":"Expertise des enseignants","precision":"Expert","citation":"Utilisation stratégique des émotions : enthousiasme pour motiver élèves Compréhension émotions des élèves Gestion des émotions en classe : maintenir l'engagement des élèves et favoriser un climat de classe propice à l’apprentissage Favoriser les émotions positives peuvent renforcer la mémoire et la compréhension Réduire les émotions négatives peuvent réduire l’anxiété et les distractions","auteur":"","reference":"","nature":"Agrégation","proposition":"","acteur":""},{"id":853,"epreuve":"E2","themes":["CORPS"],"borne":"Expertise des enseignants","precision":"Emotions dégagées par l’enseignant","citation":"Feedback par la transmission d’émotions négatives peuvent être plus efficace que les émotions positives","auteur":"Van Doorn et coll","reference":"2014","nature":"Agrégation","proposition":"","acteur":""},{"id":854,"epreuve":"E2","themes":["CORPS"],"borne":"Expertise des enseignants","precision":"Emotions dégagées par l’enseignant","citation":"FB exprimant de la joie      = perçoit l’enseignant comme plus chaleureux et compétent => contagion émotionnelle FB exprimant de la colère = améliore performance","auteur":"","reference":"","nature":"Agrégation","proposition":"","acteur":""},{"id":855,"epreuve":"E2","themes":["CORPS"],"borne":"Enseignant H/F","precision":"Accentue inégalité G/F","citation":"Une collègue femme, plus qu’un collègue homme, a statistiquement plus de chance d’accroître l’écart de notation entre les filles et les garçons au profit de ces derniers","auteur":"Bergé","reference":"2000","nature":"Agrégation","proposition":"","acteur":""},{"id":856,"epreuve":"E2","themes":["Sensations, perceptions et langage du corps"],"borne":"Idées générales","precision":"","citation":"« Sensorialité pour agir »","auteur":"Schirrer Paintendre","reference":"Rapport au corps et savoir-faire perceptif dans les APS, 2017","nature":"Agrégation","proposition":"","acteur":""},{"id":857,"epreuve":"E2","themes":["Sensations, perceptions et langage du corps"],"borne":"Idées générales","precision":"","citation":"« Connaissances par corps »","auteur":"Vanpoulle","reference":"Movement & Sport Sciences n°81, 2013","nature":"Agrégation","proposition":"","acteur":""},{"id":858,"epreuve":"E2","themes":["Sensations, perceptions et langage du corps"],"borne":"Idées générales","precision":"","citation":"« Apprendre à écouter son corps (…) pour identifier, juger, décider et agir »","auteur":"Schirrer Paintendre Sève","reference":"Pour une éducation sensorielle à travers les AP, 2020","nature":"Agrégation","proposition":"","acteur":""},{"id":859,"epreuve":"E2","themes":["Sensations, perceptions et langage du corps"],"borne":"Idées générales","precision":"","citation":"La capacité à réactualiser sans cesse ses connaissances de son corps par l’exploration sensorielle (Gaillard 2011) amène à construire des « Savoir-faire perceptif »","auteur":"Schirrer Paintendre","reference":"Rapport au corps et savoir-faire perceptif dans les APS, 2017","nature":"Agrégation","proposition":"","acteur":""},{"id":860,"epreuve":"E2","themes":["Sensations, perceptions et langage du corps"],"borne":"Idées générales","precision":"","citation":"« Hyper-écoute de son corps »","auteur":"Schirrer Paintendre Sève","reference":"Pour une éducation sensorielle à travers les AP, 2020","nature":"Agrégation","proposition":"","acteur":""},{"id":861,"epreuve":"E2","themes":["Sensations, perceptions et langage du corps"],"borne":"Sensations\nPerceptions\nLangage du corps","precision":"Définition","citation":"La sensation résulte de la stimulation, externe ou interne, des récepteurs sensoriels Extéroceptives : 5 sens Proprioceptive : détecter ses actions et mouvements dans l’espace. Intéroceptives : état interne du corps (respiration, coeur, courbatures…)","auteur":"Gaillard","reference":"L'expérience corporelle, 2011","nature":"Agrégation","proposition":"","acteur":""},{"id":862,"epreuve":"E2","themes":["Sensations, perceptions et langage du corps"],"borne":"Sensations\nPerceptions\nLangage du corps","precision":"Définition","citation":"La perception renvoie à ce qui est perçu de la sensation (Berthoz, Le sens du mouvement, 2013), elle est l’interprétation et le jugement que nous faisons à partir de la sensation. Les perceptions sont orientées par les potentialités des récepteurs, les significations diverses acquises par chaque individu","auteur":"Wathelet","reference":"Corps sensibles, 2013","nature":"Agrégation","proposition":"","acteur":""},{"id":863,"epreuve":"E2","themes":["Sensations, perceptions et langage du corps"],"borne":"Sensations\nPerceptions\nLangage du corps","precision":"Définition","citation":"Sensations différentes peuvent donner lieu à des perceptions identiques Sensations identiques peuvent aboutir à des perceptions différentes","auteur":"Bouveresse","reference":"Langage, perception et réalité, 1995","nature":"Agrégation","proposition":"","acteur":""},{"id":864,"epreuve":"E2","themes":["Sensations, perceptions et langage du corps"],"borne":"Sensations\nPerceptions\nLangage du corps","precision":"Définition","citation":"La sensibilité est la disposition de l’homme à être affecté par ses sens, des variations de ses états internes ou de certains aspects de l’environnement (Récopé L’apprentissage, 2001) ; elle pourrait se modeler, s’actualiser, s’ajuster sans cesse","auteur":"Wethelet","reference":"Corps sensibles, 2013","nature":"Agrégation","proposition":"","acteur":""},{"id":865,"epreuve":"E2","themes":["Sensations, perceptions et langage du corps"],"borne":"Sensations\nPerceptions\nLangage du corps","precision":"Définition","citation":"Compétence est définie comme l’aptitude à accomplir une tache ou faire face à de situations complexes ou inédites","auteur":"BO n°17 du 24/04/2015","reference":"","nature":"Agrégation","proposition":"","acteur":""},{"id":866,"epreuve":"E2","themes":["Sensations, perceptions et langage du corps"],"borne":"Sensations\nPerceptions\nLangage du corps","precision":"Définition","citation":"Le sujet compétent est capable de faire preuve de transversalité entre différentes situations et expériences vécues La compétence articule différentes types de ressources et se complexifie sans cesse dans une une classe de situations particulières","auteur":"Delignières","reference":"Complexité et compétences, 2009","nature":"Agrégation","proposition":"","acteur":""},{"id":867,"epreuve":"E2","themes":["Sensations, perceptions et langage du corps"],"borne":"Sensations\nPerceptions\nLangage du corps","precision":"Enjeux","citation":"Il s’agit d’aider les pratiquants à faire un « bon usage de soi » en devenant « agent de soi »","auteur":"Andrieu","reference":"L’Autosanté. Vers une médecine réflexive, 2012","nature":"Agrégation","proposition":"","acteur":""},{"id":868,"epreuve":"E2","themes":["Sensations, perceptions et langage du corps"],"borne":"Sensations\nPerceptions\nLangage du corps","precision":"Apprendre","citation":"« Connaissances par corps » (Vanpoulle, Movement & Sport Sciences n°81, 2013) se construisent et s’actualisent dans l’action par les retours répétés de certaines sensations, favorisant au auto-ajustement pour constituer et l’affiner d’un répertoire sensible « Savoir-faire perceptif » (Wathelet 2013 ; Schirrer Paintendre, Rapport au corps et savoir-faire perceptif dans les APS, 2017) est une capacité à écouter et interpréter les sensations qui émanent de son corps Identification des instants clés dans sa pratique :","auteur":"Schirrer Paintendre Sève","reference":"Pour une éducation sensorielle à travers les AP, 2020","nature":"Agrégation","proposition":"","acteur":""},{"id":869,"epreuve":"E2","themes":["Sensations, perceptions et langage du corps"],"borne":"Sensations\nPerceptions\nLangage du corps","precision":"Apprendre","citation":"« La médiation langagière apparaît essentiel afin d’aider les pratiquants à analyser ce qu’ils ont vécu en éduquent l’attention des pratiquants sur des traits pertinents de leurs sensations » « Si l’explication apportée par l’enseignants et les pairs semble informer l’entrée sensorielle, c’est bien la pratique et la réflexivité sur cette pratique qui permettent au pratiquant de construire et d’affiner des repères sensoriels » Stratégie d’intervention pour faciliter cette éducation sensorielle, afin faire rentrer les pratiquants dans une posture d’écoute attentive de leur corps :","auteur":"Schirrer","reference":"Construire des savoir-faire perceptifs en apnée, 2018","nature":"Agrégation","proposition":"","acteur":""},{"id":870,"epreuve":"E2","themes":["Sensations, perceptions et langage du corps"],"borne":"Sensations\nPerceptions\nLangage du corps","precision":"Apprendre","citation":"Focalisation de l’attention                                                                                       - Utilisation de métaphore pour dire le vécu corporel « Extrémisation » des sensations à l’aide de situations contrastes                        - Apport de connaissances théoriques Partage des ressentis                                                                                              - Comparer avec des sensations antérieures Médiation langagière                                                                                               - Proposition, puis affinement d’une échelle de ressentis","auteur":"","reference":"","nature":"Agrégation","proposition":"","acteur":""},{"id":871,"epreuve":"E2","themes":["Sensations, perceptions et langage du corps"],"borne":"Sensations\nPerceptions\nLangage du corps","precision":"Apprendre","citation":"Apprentissage sensoriel : Phase de découverte « Ses possibilités corporelles sont en quête d’informations sensorielles fiables pour moduler l’intensité d’engagement » —> Apprendre à établir des liens explicites entre les données objectifs et subjectives, afin de l’aider à discriminer et hiérarchiser les sensations perçues Phase de consolidation A ce stade de la répétition, le jugement fait preuve d’une grande qualité d’écoute corporelle, et de confiance sur la base des informations recueillies Phase experte Les sensation corporelles perçues servent de point de jugement en ayant été ressenties dans d’autres circonstances (Paintendre, Le corps capacitaire en STEP, 2017). « Opère une démarche d’état des lieux, à partir de repère mnésiques et sensoriels qui servent de points de comparaison »","auteur":"","reference":"","nature":"Agrégation","proposition":"","acteur":""},{"id":872,"epreuve":"E2","themes":["Sensations, perceptions et langage du corps"],"borne":"Sensations\nPerceptions\nLangage du corps","precision":"Progressivité","citation":"« Les sensations corporelles deviennent progressivement des outils plus ou moins efficaces et pertinents à la régulation du projet de pratique » « Les pratiquants apprennent, à leur rythme, à les repérer, à la identifier, à les nommer, à les discriminer, à leur donner du sens en utilisant certains outils »","auteur":"","reference":"","nature":"Agrégation","proposition":"","acteur":""},{"id":873,"epreuve":"E2","themes":["Sensations, perceptions et langage du corps"],"borne":"Sensations\nPerceptions\nLangage du corps","precision":"Progressivité","citation":"Problème  tel processus (surestimation/sous-estimation), cela vient d’autant plus relativiser notre constat au sens où (sujet).","auteur":"","reference":"","nature":"Agrégation","proposition":"","acteur":""},{"id":1280,"epreuve":"E2","themes":["Surestimation – Sous-estimation"],"borne":"Illustration en EPS","precision":"B2","citation":"Sur les propositions de David Adé et John Komer (2014), nous pensons que « proscrire » l’activité des élèves en ouvrant les possibles mais en limitant les choix, peut être un levier pour lutter contre les stratégies d’exploration inefficaces et ainsi (sujet).","auteur":"","reference":"","nature":"Agrégation","proposition":"","acteur":""},{"id":1281,"epreuve":"E2","themes":["Surestimation – Sous-estimation"],"borne":"Illustration en EPS","precision":"B2","citation":"«  agenda de grimpe  »","auteur":"","reference":"","nature":"Agrégation","proposition":"","acteur":""},{"id":1282,"epreuve":"E2","themes":["Surestimation – Sous-estimation"],"borne":"Illustration en EPS","precision":"B2","citation":"«  gérer ses ressources pour réaliser en totalité un parcours sécurisé  »","auteur":"Programme Lycée 2019","reference":"","nature":"Agrégation","proposition":"","acteur":""},{"id":1283,"epreuve":"E2","themes":["Surestimation – Sous-estimation"],"borne":"Illustration en EPS","precision":"B2","citation":"«  apprend à se connaître, à faire des choix  »","auteur":"Programme Lycée 2019","reference":"","nature":"Agrégation","proposition":"","acteur":""},{"id":1284,"epreuve":"E2","themes":["Impuissance apprise"],"borne":"Cadrage théorique","precision":"B2","citation":"Ce concept renvoie ainsi à l’idée d’un état psychologique post-apprentissage induit par un manque de maitrise de l’élève face aux tâches demandées et peut trouver écho au sein de la théorie du manque d’espoir ou du désespoir (Abramson, Metalsky et Alloy, 1989), mettant quant à elle en lumière une perte de confiance de l’individu dans ses capacités à réussir à la suite d’échecs répétés.","auteur":" es débiles moteurs resplendissants de santé »","auteur":"Le Boulch","reference":"Esquisse d'une méthode rationnelle et expérimentale d'EP, Revue EPS n°157, 1961","nature":"Acteur","proposition":"","acteur":"Jean Le Boulch"},{"id":2307,"epreuve":"E1","themes":["Jean Le Boulch"],"borne":"Finalité EP","precision":"Méthodes 2015","citation":"« faire du corps un instrument parfait d'adaptation de l'individu à son milieu tant physique que social grâce à l'acquisition de l'adresse »","auteur":"Le Boulch","reference":"L'EP fonctionnelle à l'école primaire, 1952","nature":"Acteur","proposition":"","acteur":"Jean Le Boulch"},{"id":2308,"epreuve":"E1","themes":["Jean Le Boulch"],"borne":"Socialisation","precision":"Méthodes 2015","citation":"« Ni l'EP, ni le sport n'ont de vertu socialisante en soi. »","auteur":"Le Boulch","reference":"L'EPS, voie d'intégration sociale, 1967","nature":"Acteur","proposition":"","acteur":"Jean Le Boulch"},{"id":2309,"epreuve":"E1","themes":["Jean Le Boulch"],"borne":"Défaite face aux IO 67","precision":"Méthodes 2015","citation":"« Les IO de 67 ont consacré ma défaite »","auteur":"Le Boulch","reference":"Face au sport, 1978","nature":"Acteur","proposition":"","acteur":"Jean Le Boulch"},{"id":2310,"epreuve":"E1","themes":["Jean Le Boulch"],"borne":"Finalité","precision":"Méthodes 2015","citation":"« Nous considérons pour notre part que l'éducation doit favoriser un épanouissement humain permettant à chacun d'acquérir une véritable autonomie et l'accès à la responsabilité dans le cadre de la vie sociale »","auteur":"Le Boulch","reference":"L'EPS, voie d'intégration sociale, 1967","nature":"Acteur","proposition":"","acteur":"Jean Le Boulch"},{"id":2311,"epreuve":"E1","themes":["Pierre Parlebas"],"borne":"Émiettement","precision":"Méthodes 2015","citation":"« l'éducation physique s'éparpille aujourd'hui dans une poussière de spécialités. Elle est devenue un polypier de techniques »","auteur":"Parlebas","reference":"L'Éducation physique en miettes, R tion":"« Comment être une discipline d'enseignement à part entière et entièrement à part ? »","auteur":"Hébrard","reference":"L'EPS : réflexions et perspectives, 1986","nature":"Acteur","proposition":"","acteur":"Alain Hébrard"},{"id":2323,"epreuve":"E1","themes":["Claude Pineau"],"borne":"Discipline d'enseignement","precision":"Méthodes 2015","citation":"« Au dessein de former s'ajoute désormais celui d'enseigner »","auteur":"Pineau","reference":"EPS Discipline d'enseignement, Revue EPS n°205, 1987","nature":"Acteur","proposition":"","acteur":"Claude Pineau"},{"id":2324,"epreuve":"E1","themes":["Claude Pineau"],"borne":"Discipline d'enseignement","precision":"Méthodes 2015","citation":"« l'EPS ne saurait se réduire (…) à l'aide qu'elle apporte par l'éducation du mouvement à la conservation et au développement des fonctions de vie et de relation, ainsi qu'à l'élaboration des conduites motrices »","auteur":"Pineau","reference":"EPS discipline d'enseignement, Revue EPS n°205, 1987","nature":"Acteur","proposition":"","acteur":"Claude Pineau"},{"id":2325,"epreuve":"E1","themes":["Gilles Klein"],"borne":"Culture corporelle","precision":"Méthodes 2015","citation":"« Le lycée nous semble devoir être le lieu privilégié de l'acquisition d'une culture corporelle »","auteur":"Klein","reference":"Revue EPS n°279, 1999","nature":"Acteur","proposition":"","acteur":"Gilles Klein"},{"id":2326,"epreuve":"E1","themes":["Gilles Klein"],"borne":"Statut de l'EPS","precision":"Méthodes 2015","citation":"« dans la hiérarchie implicite des disciplines, l'EP serait en quelque sorte la grenouille qui se veut aussi grosse que le bœuf »","auteur":"Klein","reference":"La grenouille, le bœuf et le mille-pattes, Revue EPS n°285, 2000","nature":"Acteur","proposition":"","acteur":"Gilles Klein"},{"id":2327,"epreuve":"E1","themes":["Gilles Klein"],"borne":"Programmes","precision":"Méthodes 2015","citation":"« Il ne peut exister de bons programmes qu'à la double condition d'un travail acharné sur les "citation":"« le sport est un moyen exceptionnel d'éducation »","auteur":"De Gaulle","reference":"Cité par Herzog, 1964","nature":"Acteur","proposition":"","acteur":"Pierre de Coubertin"},{"id":2333,"epreuve":"E1","themes":["Alice Milliat"],"borne":"Biographie / Combat","precision":"Fiches Acteurs","citation":"Alice Milliat combat avec souplesse et subtilité les arguments médicaux, sociaux et moraux qui lui opposent les détracteurs des sports pour les femmes.","auteur":"Carpentier","reference":"Alice Milliat et le premier sport féminin dans l'entre-deux-guerres, 2019","nature":"Acteur","proposition":"","acteur":"Alice Milliat"},{"id":2334,"epreuve":"E1","themes":["Alice Milliat"],"borne":"Stratégie","precision":"Fiches Acteurs","citation":"MILLIAT ne sera jamais militante féministe ou politique en dehors du monde sportif","auteur":"Carpentier","reference":"Alice Milliat et le premier sport féminin dans l'entre-deux-guerres, 2019","nature":"Acteur","proposition":"","acteur":"Alice Milliat"},{"id":2335,"epreuve":"E1","themes":["Alice Milliat"],"borne":"Pratique sportive féminine","precision":"Fiches Acteurs","citation":"Selon elle, les sportives peuvent pratiquer tous les sports mais avec des adaptations, s'adonner à la compétition, y compris lors de Jeux internationaux, sous contrôle des médecins de la fédération et porter des tenues dénudées mais validées par les dirigeants.","auteur":"Milliat","reference":"La Femme sportive, 1922","nature":"Acteur","proposition":"","acteur":"Alice Milliat"},{"id":2336,"epreuve":"E1","themes":["Alice Milliat"],"borne":"Pratique sportive féminine","precision":"Fiches Acteurs","citation":"« Rangeons-nous donc à l'avis de nos doctoresses qui, joignant la pratique au savoir, déclarent que seules les études faites sur plusieurs générations permettront de déterminer, avec quelques chances d'éviter les erreurs, quels sont les sports qu'une femme peut pratiquer sans danger et utilement. »","auteur":"Milliat","reference":"« Propagande », La Femme sportive, 1922","nature":"Acteur","proposition":"","acteur":"Alice Milliat"},{"id":2337,"epreuve":"E1","themes":["Alice Milliat"],"borne":"Apprentissages progressifs","precision":"Fiches Acteurs","citation":"Elle propose des progressions dans les apprentissages au cas par cas : les jeunes filles doivent s'adonner à « une culture physique raisonnée et intelligente conduisant à la pratique des divers sports suivant les goûts et les moyens de chaque adhérente »","auteur":"Milliat","reference":"L'Auto, 1924","nature":"Acteur","proposition":"","acteur":"Alice Milliat"},{"id":2338,"epreuve":"E1","themes":["Alice Milliat"],"borne":"Indépendance fédérale","precision":"Fiches Acteurs","citation":"« Nul plus que moi ne peut désirer pour nos sociétés une direction et un enseignement totalement féminins » et « souhaitons que le sport féminin trouve dans l'élément féminin toutes ses dirigeantes administratives et techniques »","auteur":"Milliat","reference":"L'Auto, 1924","nature":"Acteur","proposition":"","acteur":"Alice Milliat"},{"id":2339,"epreuve":"E1","themes":["Alice Milliat"],"borne":"Fédération autonome","precision":"Fiches Acteurs","citation":"« le bureau de la FFF [FSFSF devenue FFF] sera composé de femmes, comme l'a décidé notre dernière réunion du 6 août. Nous garderons donc notre complète indépendance »","auteur":"Milliat","reference":"L'Auto, 1922","nature":"Acteur","proposition":"","acteur":"Alice Milliat"},{"id":2340,"epreuve":"E1","themes":["Alice Milliat"],"borne":"Féminisme et sport","precision":"Fiches Acteurs","citation":"Le jour où les femmes françaises auront réussi à faire compléter les devoirs qu'on s'est toujours empressé de leur imposer par leurs droits sociaux et politiques, la situation changera d'aspect.","auteur":"Milliat","reference":"La Française, 1923","nature":"Acteur","proposition":"","acteur":"Alice Milliat"},{"id":2341,"epreuve":"E1","themes":["Alice Milliat"],"borne":"Résistances — Coubertin","precision":"Fiches Acteurs","citation":"Pierre de Coubertin, président du CIO jusqu'en 1925 va ignorer ses requêtes : « Les Jeux Olympiques doivent être réservés aux hommes, le rôle des femmes devrait être avant tout de couronner les vainqueurs. (...) Une olympiade femelle est impensable : elle est impraticable, inesthétique et incorrecte. »","auteur":"Coubertin","reference":"Président CIO","nature":"Acteur","proposition":"","acteur":"Alice Milliat"},{"id":2342,"epreuve":"E1","themes":["Alice Milliat"],"borne":"Résistances — Arguments médicaux","precision":"Fiches Acteurs","citation":"Les principaux arguments contre la pratique sportive des femmes reposent sur l'idée communément admise par le corps médical et la société que le sexe féminin est un sexe « faible », les sports, qui demandent un effort physique important, ne sauraient convenir à leur nature supposée fragile, de même que l'effort physique pourrait nuire aux organes génitaux et donc à la procréation.","auteur":"Arguments contre le sport féminin","reference":"","nature":"Acteur","proposition":"","acteur":"Alice Milliat"},{"id":2343,"epreuve":"E1","themes":["Alice Milliat"],"borne":"Influence sur l'EP","precision":"Fiches Acteurs","citation":"Alice Milliat (1884-1957) et Marie-Thérèse Eyquem (1913-1978) sont deux dirigeantes du sport féminin dont l'action institutionnelle en France et au niveau international a eu de spectaculaires conséquences sur le développement de la pratique sportives des femmes des années 1920 aux années 1960.","auteur":"Terret et al.","reference":"D'une guerre à l'autre, 2014","nature":"Acteur","proposition":"","acteur":"Alice Milliat"},{"id":2344,"epreuve":"E1","themes":["Alice Milliat"],"borne":"Réseau — Jane Misme","precision":"Fiches Acteurs","citation":"Ses idées sont à rapprocher de celles de Jane Misme dont l'intérêt pour l'EP et les sports comme pratiques émancipatrices remonte à l'avant-guerre. Féminisme qui milite pour l'égalité des sexes et l'amélioration des conditions sociales des femmes par les sports.","auteur":"Terret","reference":"2014","nature":"Acteur","proposition":"","acteur":"Alice Milliat"},{"id":2345,"epreuve":"E1","themes":["Marie-Thérèse Eyquem"],"borne":"Biographie / Vichy","precision":"Fiches Acteurs","citation":"En théorie, Vichy veut respecter les préoccupations des familles, qui considèreraient la compétition féminine comme une exhibition. C'est pourtant Marie-Thérèse Eyquem qui, en 1942, organise la fête de la sportive, dans un souci de propagande pour le sport féminin. Or cette fête consiste en une suite de démonstrations sportives. Même si la compétition est absente, l'exhibition est bien là.","auteur":"Castan-Vicente","reference":"Du sport à la politique, 2009","nature":"Acteur","proposition":"","acteur":"Marie-Thérèse Eyquem"},{"id":2346,"epreuve":"E1","themes":["Marie-Thérèse Eyquem"],"borne":"Finalité — Sport féminin","precision":"Fiches Acteurs","citation":"« Le sport est une arme délicate, le sport féminin surtout. Mais une arme nécessaire pour redonner à la France un souffle vital. Apportons tous nos soins au maniement de cette arme dangereuse mais indispensable, comme le chirurgien au maniement du scalpel qui doit sauver le malade, mais peut aussi l'achever. Notre devoir nous est tracé par ceux et celles qui veillent sur le sport féminin parce qu'ils croient en son utilité, en sa prodigieuse efficacité pour la reconstruction des corps et l'équilibre mental et moral, mais ne dissimulent pas ses dangers. »","auteur":"Eyquem","reference":"La femme et le sport, 1944","nature":"Acteur","proposition":"","acteur":"Marie-Thérèse Eyquem"},{"id":2347,"epreuve":"E1","themes":["Marie-Thérèse Eyquem"],"borne":"Non-mixité","precision":"Fiches Acteurs","citation":"« Nous demandons pour la femme une EP vraiment féminine. » (1942)","auteur":"Eyquem","reference":"1942","nature":"Acteur","proposition":"","acteur":"Marie-Thérèse Eyquem"},{"id":2348,"epreuve":"E1","themes":["Marie-Thérèse Eyquem"],"borne":"Féminisme essentialiste","precision":"Fiches Acteurs","citation":"ENJEU : Réduire les principaux dangers résultants de l'activité physique pour « réaliser un sport équilibré, mesuré, simple, en un mot véritablement féminin »","auteur":"Eyquem","reference":"Marie-Thérèse Eyquem, nous parle du sport féminin, Tous les sports, 1941","nature":"Acteur","proposition":"","acteur":"Marie-Thérèse Eyquem"},{"id":2349,"epreuve":"E1","themes":["Marie-Thérèse Eyquem"],"borne":"Féminisme essentialiste","precision":"Fiches Acteurs","citation":"La femme n'est pas inférieure à l'homme, elle a des qualités féminines à développer alors que l'homme à des qualités masculines — Inverse du féminisme radical de DE BEAUVOIR qui veut gommer les différences","auteur":"Eyquem","reference":"La femme et le sport, 1944","nature":"Acteur","proposition":"","acteur":"Marie-Thérèse Eyquem"},{"id":2350,"epreuve":"E1","themes":["Marie-Thérèse Eyquem"],"borne":"Idéaux conservateurs","precision":"Fiches Acteurs","citation":"« Une fantastique spécialement adaptée aux femmes et théorisée par une femme ! » — « il convient de privilégier les exercices de déplacement, de souplesse et d'adresse plus que ceux de force pure » = des exercices « spécialement adaptés » à la nature féminine.","auteur":"Eyquem","reference":"Connaissez-vous le Rayon Sportif Féminin ?, 1939","nature":"Acteur","proposition":"","acteur":"Marie-Thérèse Eyquem"},{"id":2351,"epreuve":"E1","themes":["Marie-Thérèse Eyquem"],"borne":"Ouvrages — La femme et le sport","precision":"Fiches Acteurs","citation":"« La femme et le sport, 1944 : N'oublie jamais ta mission de femme. Tu aimes le stade, préfère-lui la maison. Tu es fille de France, la France compte sur toi »","auteur":"Eyquem","reference":"La femme et le sport, 1944","nature":"Acteur","proposition":"","acteur":"Marie-Thérèse Eyquem"},{"id":2352,"epreuve":"E1","themes":["Marie-Thérèse Eyquem"],"borne":"Formation des profs","precision":"Fiches Acteurs","citation":"Importance de former des « femmes d'action » qui incarnent la régénération des forces vives du pays. Eyquem met en avant le besoin de femmes formées et informées des « spécificités féminines », capables de répondre plus efficacement « au besoin de tact et de psychologie » des adolescentes que le moniteur masculin.","auteur":"Szerdahelyi","reference":"2016","nature":"Acteur","proposition":"","acteur":"Marie-Thérèse Eyquem"},{"id":2353,"epreuve":"E1","themes":["Marie-Thérèse Eyquem"],"borne":"Formation des profs","precision":"Fiches Acteurs","citation":"Sous Vichy, elle a un rôle actif de relais de l'action du Commissariat en direction des femmes en créant des stages de formation de cadres en collaboration avec les fédérations féminines. [...] En 1941, on compte « 6000 monitrices d'EP nouvellement formées et 100 clubs féminins nouveaux chaque mois »","auteur":"Eyquem","reference":"Tous les sports, 1941","nature":"Acteur","proposition":"","acteur":"Marie-Thérèse Eyquem"},{"id":2354,"epreuve":"E1","themes":["Marie-Thérèse Eyquem"],"borne":"Deux périodes","precision":"Fiches Acteurs","citation":"Il faut distinguer deux périodes dans l'action de Marie-Thérèse Eyquem. La première, allant de 1940 à 1942, se caractérise par une grande activité, due à la confiance que le commissaire Jean Borotra lui prête.","auteur":"Castan-Vicente","reference":"Du sport à la politique, 2009","nature":"Acteur","proposition":"","acteur":"Marie-Thérèse Eyquem"},{"id":2355,"epreuve":"E1","themes":["Marie-Thérèse Eyquem"],"borne":"Influence sur l'EP","precision":"Fiches Acteurs","citation":"Alice Milliat (1884-1957) et Marie-Thérèse Eyquem (1913-1978) sont deux dirigeantes du sport féminin dont l'action institutionnelle en France et au niveau international a eu de spectaculaires conséquences sur le développement de la pratique sportives des femmes des années 1920 aux années 1960.","auteur":"Terret et al.","reference":"D'une guerre à l'autre, 2014","nature":"Acteur","proposition":"","acteur":"Marie-Thérèse Eyquem"},{"id":2356,"epreuve":"E1","themes":["Marie-Thérèse Eyquem"],"borne":"Femme caméléon","precision":"Fiches Acteurs","citation":"Marie-Thérèse Eyquem est passée du militantisme catholique dans le sport féminin au militantisme féministe et socialiste","auteur":"Terret","reference":"From Alice Milliat to Marie-Thérèse Eyquem, revisiting women's sport in France (1920-1960s), 2010","nature":"Acteur","proposition":"","acteur":"Marie-Thérèse Eyquem"},{"id":2357,"epreuve":"E1","themes":["Claude Pujade-Renaud"],"borne":"Expression corporelle — définition","precision":"Fiches Acteurs","citation":"« L'éducation physique croit que la motricité est l'effet d'un apprentissage. L'expression corporelle parle d'une histoire qui est venue s'inscrire dans le corps »","auteur":"Pujade-Renaud","reference":"Expression corporelle. Langage du silence, 1974, p.85","nature":"Acteur","proposition":"","acteur":"Claude Pujade-Renaud"},{"id":2358,"epreuve":"E1","themes":["Claude Pujade-Renaud"],"borne":"Rupture avec le courant sportif","precision":"Fiches Acteurs","citation":"Les activités sportives [sont] partie intégrante mais non suffisante d'une éducation corporelle entendue dans un sens extensif. Dans un contexte des années 70 où l'enseignement de l'EP se traduit le plus souvent par la recherche de la plus grande efficacité sportive, pour CPJ, le sport peut participer à l'EP, mais pas de façon exclusive.","auteur":"Pujade-Renaud","reference":"1979","nature":"Acteur","proposition":"","acteur":"Claude Pujade-Renaud"},{"id":2359,"epreuve":"E1","themes":["Claude Pujade-Renaud"],"borne":"Pédagogie","precision":"Fiches Acteurs","citation":"« Une pédagogie centrée davantage sur l'exploration du mouvement que sur l'apprentissage d'un vocabulaire »","auteur":"CPR","reference":"L'expression corporelle impossible, Revue Esprit n°5, 1975","nature":"Acteur","proposition":"","acteur":"Claude Pujade-Renaud"},{"id":2360,"epreuve":"E1","themes":["Claude Pujade-Renaud"],"borne":"Relation pédagogique","precision":"Fiches Acteurs","citation":"Défend une formation d'enseignantes sensibilisées à une pédagogie du sensible : elle prône sur la relation pédagogique, davantage « l'animateur-analyseur » que le « démonstrateur détenteur de technique »","auteur":"Pujade-Renaud","reference":"L'expression corporelle impossible, Revue Esprit n°5, 1975","nature":"Acteur","proposition":"","acteur":"Claude Pujade-Renaud"},{"id":2361,"epreuve":"E1","themes":["Claude Pujade-Renaud"],"borne":"Corps et EP","precision":"Fiches Acteurs","citation":"« L'éducation physique, on le verra plus loin, s'alignera sur cette position : conscience-pilote régissant un corps à maîtriser. Corps utensilisé. Il doit servir à l'action. [...] La psychanalyse parle d'un tout autre corps. Non point un corps visible dans sa matérialité, objectivement offert au regard, observé et décodé par le psychologue behavioriste. Non point le corps organique et fonctionnel de la médecine ou de l'éducation physique. Mais un corps tout à la fois di-réalisé et lesté par l'inconscient. »","auteur":"Pujade-Renaud","reference":"Expression corporelle. Langage du silence, 1974","nature":"Acteur","proposition":"","acteur":"Claude Pujade-Renaud"},{"id":2362,"epreuve":"E1","themes":["Claude Pujade-Renaud"],"borne":"Critique de l'EP scientifique","precision":"Fiches Acteurs","citation":"« On peut s'interroger sur la part souvent laissée ici au mythe d'une science souveraine, inconsciente des objectifs et des normes d'un manque de vigilance peut lui faire servir. Nous nous contentons de nous demander si la place tant espérée que compte attribuer à l'expérimentation une éducation physique enfin scientifique n'a pas tendance à masquer d'autres démarches auxquelles on ne saurait pour autant dénier toute scientificité. »","auteur":"Pujade-Renaud et Vigarello","reference":"Éléments pour une approche clinique en éducation physique, Revue EPS, 1975","nature":"Acteur","proposition":"","acteur":"Claude Pujade-Renaud"},{"id":2363,"epreuve":"E1","themes":["Claude Pujade-Renaud"],"borne":"Influence IO","precision":"Fiches Acteurs","citation":"Influence les IO de 1967 où l'on recommande l'enseignement des activités d'expression corporelle seulement pour les filles et pour formation des enseignantes.","auteur":"Pujade-Renaud","reference":"Influence IO 1967","nature":"Acteur","proposition":"","acteur":"Claude Pujade-Renaud"},{"id":2364,"epreuve":"E1","themes":["Claude Pujade-Renaud"],"borne":"Influence IO","precision":"Fiches Acteurs","citation":"Influence Prgm 1996 avec les APSA « permettent à tous les élèves de s'éprouver physiquement et de mieux se connaître en vivant des expériences variées et originales, sources d'émotion et de plaisir »","auteur":"Pujade-Renaud","reference":"Influence Prgm 1996","nature":"Acteur","proposition":"","acteur":"Claude Pujade-Renaud"},{"id":2365,"epreuve":"E1","themes":["Claude Pujade-Renaud"],"borne":"Entretien","precision":"Fiches Acteurs","citation":"« Je pense malgré tout qu'avoir eu une position critique a été assez utile pour faire bouger un peu l'EP. »","auteur":"Pujade-Renaud","reference":"Entretien, Revue Contrepied, 2003","nature":"Acteur","proposition":"","acteur":"Claude Pujade-Renaud"},{"id":2366,"epreuve":"E1","themes":["Georges Hébert"],"borne":"Philosophie hébertiste","precision":"Fiches Acteurs","citation":"« C'est la philosophie qui dit dégager de cette méthode naturelle pour inciter l'individu à mettre au service des autres tout ce qu'il a pu retirer de sa formation physique et virile. Cela dépasse donc de beaucoup le cadre d'une simple culture physique, pour devenir une véritable éducation, indispensable liaison du physique et du moral. »","auteur":"Defarges cit. Hébert","reference":"1958","nature":"Acteur","proposition":"","acteur":"Georges Hébert"},{"id":2367,"epreuve":"E1","themes":["Georges Hébert"],"borne":"Hébertisme — définition","precision":"Fiches Acteurs","citation":"L'hébertisme est une philosophie, la méthode naturelle est la mise en œuvre par les profs. C'est un caméléon, il sait se mettre dans les couleurs de son temps et s'ériger sur une œuvre qui est la sienne.","auteur":"Collinet","reference":"Le courant naturaliste, Georges Hébert, 2000","nature":"Acteur","proposition":"","acteur":"Georges Hébert"},{"id":2368,"epreuve":"E1","themes":["Georges Hébert"],"borne":"Méthode naturelle — définition","precision":"Fiches Acteurs","citation":"« La méthode naturelle d'éducation physique est un retour à la nature, raisonnée et adapté aux conditions sociales de vie »","auteur":"Hébert","reference":"Le code de la force, 1911","nature":"Acteur","proposition":"","acteur":"Georges Hébert"},{"id":2369,"epreuve":"E1","themes":["Georges Hébert"],"borne":"Critique du sport de record","precision":"Fiches Acteurs","citation":"« La passion, le besoin de championnat, en matière d'amateurisme, déforme toute la portée sociale du sport ; elle en fausse l'idée et les résultats, elle fait passer le sport de moyen admirable d'éducation sociale sur le tréteau des marchands de boniments »","auteur":"Desgrange","reference":"L'Auto, 1925","nature":"Acteur","proposition":"","acteur":"Georges Hébert"},{"id":2370,"epreuve":"E1","themes":["Georges Hébert"],"borne":"EP virile et morale","precision":"Fiches Acteurs","citation":"« L'EP est avant tout une question d'ordre pédagogique et non pas physiologique, encore moins médicale. Elle nécessite une connaissance approfondie de l'enfant et de l'adolescent »","auteur":"Hébert","reference":"L'EP virile et morale par la méthode naturelle, 1936","nature":"Acteur","proposition":"","acteur":"Georges Hébert"},{"id":2371,"epreuve":"E1","themes":["Georges Hébert"],"borne":"Pédagogie naturaliste","precision":"Fiches Acteurs","citation":"« je ne suis ni médecin, ni sportif, j'apprécie le corps pour sa mise en œuvre naturelle »","auteur":"Hébert","reference":"Revue EP, 1925","nature":"Acteur","proposition":"","acteur":"Georges Hébert"},{"id":2372,"epreuve":"E1","themes":["Georges Hébert"],"borne":"Ouverture de la MN","precision":"Fiches Acteurs","citation":"« On peut faire du redressement scientifique avec les exercices de marche, de course, de saut, bien mieux qu'avec les exercices analytiques » — Il ne change pas de discours et va disparaître car il ne se renouvelle pas.","auteur":"Hébert","reference":"Revue EPS, 1947","nature":"Acteur","proposition":"","acteur":"Georges Hébert"},{"id":2373,"epreuve":"E1","themes":["Georges Hébert"],"borne":"Résistances — Vichy","precision":"Fiches Acteurs","citation":"Sous Vichy, La méthode naturelle est prise comme méthode nationale sans l'accord d'Hébert, « Hébert ne veut avoir aucune relation avec BOROTRA disant que cela n'aboutirait à rien »","auteur":"Compte rendu du groupement hébertiste","reference":"1941","nature":"Acteur","proposition":"","acteur":"Georges Hébert"},{"id":2374,"epreuve":"E1","themes":["Georges Hébert"],"borne":"Entrepreneur habile","precision":"Fiches Acteurs","citation":"Hébert comme « entrepreneur habile » voyant dans l'EP féminine une opportunité de gagner une influence et une manne financière notamment via les Palestres (Deauville)","auteur":"Andrieu","reference":"L'EP au XXe siècle, 1988","nature":"Acteur","proposition":"","acteur":"Georges Hébert"},{"id":2375,"epreuve":"E1","themes":["Georges Hébert"],"borne":"Évaluation — Fiches hébertistes","precision":"Fiches Acteurs","citation":"Les « fiches hébertistes » : fiches portant sur les différentes familles athlétiques constituant le « minima » à atteindre. Davantage qu'un champion spécialiste, c'est un athlète complet qui est visé : « la méthode que je prône depuis plusieurs années vise le développement complet et utilitaire »","auteur":"Hébert","reference":"Le code de la force, 1911","nature":"Acteur","proposition":"","acteur":"Georges Hébert"},{"id":2376,"epreuve":"E1","themes":["Georges Hébert"],"borne":"EP féminine","precision":"Fiches Acteurs","citation":"Hébert avait aussi conçu les bases de sa conception de l'EP féminine et l'idée d'égalité des sexes à une époque pleine de préjugés","auteur":"Villaret et Delaplace","reference":"La place des femmes dans la méthode naturelle de Georges Hébert, 1999","nature":"Acteur","proposition":"","acteur":"Georges Hébert"},{"id":2377,"epreuve":"E1","themes":["Georges Hébert"],"borne":"Les femmes et la MN","precision":"Fiches Acteurs","citation":"Les femmes de cette génération (entre 2 guerres) n'ont pas ou peu reçu d'EP : santé, beauté et résistance s'en ressentent d'autant plus que leur activité est restreinte : « l'exercice compte comme affirmation physique, moral : santé, beauté et force ne peuvent s'acquérir et surtout se conserver que par l'exercice sous forme naturelle. »","auteur":"Hébert","reference":"Muscle et beauté plastique, 1942","nature":"Acteur","proposition":"","acteur":"Georges Hébert"},{"id":2378,"epreuve":"E1","themes":["Georges Hébert"],"borne":"Jean Guimier","precision":"Fiches Acteurs","citation":"« les idées d'Hébert sur l'éducation physique et sur le sport sont singulièrement proches de celles de la FSGT »","auteur":"Guimier","reference":"Figure de sport ouvrier et FSGT, 1938","nature":"Acteur","proposition":"","acteur":"Georges Hébert"}];
